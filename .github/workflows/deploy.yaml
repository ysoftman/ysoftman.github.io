name: Deploy to ysoftman gitHub pages

on:
  push:
    branches:
      - main # 배포하려는 브랜치 이름

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      secrets_test: ${{ secrets.TEST }}
      variables_test: ${{ vars.TEST }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # 전체 이력(tags 포함) 가져오기
          fetch-depth: 0
          # 또는 태그 정보  표시
          # tags: true
      # https://bun.sh/guides/runtime/cicd
      - uses: oven-sh/setup-bun@v2

      - name: for test
        run: |
          echo "secrets_test: $secrets_test"
          echo "variables_test: $variables_test"

      - name: Build
        run: |
          bun install
          bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
